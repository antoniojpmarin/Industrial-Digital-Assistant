
services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8npass
      POSTGRES_DB: n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal-net
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:2.4.7-exp.0
    container_name: n8n
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: n8npass
      GENERIC_TIMEZONE: Europe/Madrid
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: admin123
      N8N_ENCRYPTION_KEY: unaClaveDeCifradoSegura1234567890123456
      N8N_LISTEN_ADDRESS: 0.0.0.0
      N8N_HOST: localhost
      WEBHOOK_URL: http://localhost:5678
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    networks:
      - internal-net
    restart: unless-stopped

  nodered:
    image: nodered/node-red
    container_name: nodered
    environment:
      - TZ=Europe/Madrid
    ports:
      - "1880:1880"
    volumes:
      - nodered_data:/data
    networks:
      - internal-net
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal-net
    restart: unless-stopped

  python-grafica:
    image: python:3.11
    container_name: python-grafica
    working_dir: /app
    volumes:
      - ./python:/app
    command: bash -c "pip install -r requirements.txt && python3 server.py"
    networks:
      - internal-net
    restart: unless-stopped




networks:
  internal-net:
    driver: bridge

volumes:
  postgres_data:
  n8n_data:
  nodered_data:
  ollama_data:
